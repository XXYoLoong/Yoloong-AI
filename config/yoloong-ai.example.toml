[assistant]
name = "江徽音"
user_name = "游龙"
persona_dir = "personas/jiang_huiyin"
approval_channel = "wechat"
region_profile = "china"

[runtime]
data_dir = ".runtime"
db_path = ".runtime/yoloong.sqlite3"
safe_root = "."
idle_interval_seconds = 900
offline = false

[models.deepseek]
base_url = "https://api.deepseek.com"
chat_model = "deepseek-v4-pro"
fast_model = "deepseek-v4-flash"

[models.dashscope]
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
chat_model = "qwen3.6-plus"
vision_model = "qwen3-vl-plus"
ocr_model = "qwen-vl-ocr-latest"
translation_model = "qwen-mt-plus"

[search]
default_region = "china"
max_results = 5
